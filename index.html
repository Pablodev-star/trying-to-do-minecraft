<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minecraft v1 - Inicio</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="menu-screen" aria-live="polite">
      <section id="main-menu" class="panel" aria-label="Menú principal">
        <h1 class="game-title">MINECRAFT</h1>
        <p class="subtitle">Versión 1 (prototipo)</p>

        <nav class="menu-buttons" aria-label="Opciones principales">
          <button type="button" id="btn-solo" class="menu-btn">Solitario</button>
          <button type="button" class="menu-btn">Multijugador</button>
          <button type="button" class="menu-btn">Opciones...</button>
          <button type="button" class="menu-btn">Salir del juego</button>
        </nav>
      </section>

      <section id="worlds-menu" class="panel hidden" aria-label="Tus mundos">
        <h2 class="section-title">Tus mundos</h2>
        <ul id="world-list" class="world-list" aria-live="polite"></ul>

        <div class="menu-buttons">
          <button type="button" id="btn-open-world" class="menu-btn" disabled>Abrir mundo</button>
          <button type="button" id="btn-new-world" class="menu-btn">Nuevo mundo</button>
          <button type="button" id="btn-back" class="menu-btn">Volver</button>
        </div>
      </section>

      <dialog id="seed-dialog" class="seed-dialog">
        <form id="seed-form" method="dialog" class="seed-form">
          <p class="seed-question">¿Quieres elegir una seed o usar una aleatoria?</p>
          <div class="seed-actions">
            <button type="button" id="btn-random-seed" class="menu-btn">Aleatoria</button>
            <button type="button" id="btn-custom-seed" class="menu-btn">Elegir seed</button>
          </div>
          <label for="seed-input" class="seed-label">Seed personalizada (opcional)</label>
          <input id="seed-input" name="seed" type="text" maxlength="40" placeholder="Ej: montanas123" />
          <div class="seed-actions">
            <button type="button" id="btn-save-custom" class="menu-btn">Guardar mundo</button>
            <button type="button" id="btn-cancel" class="menu-btn">Cancelar</button>
          </div>
        </form>
      </dialog>
    </main>

    <section id="game-view" class="hidden" aria-label="Vista del mapa">
      <canvas id="game-canvas"></canvas>
      <div id="crosshair">+</div>
      <div id="hud">WASD mover · E inventario · Click izq picar · Click der colocar</div>
      <div id="hotbar" class="hotbar" aria-label="Barra rápida"></div>
      <section id="inventory-panel" class="inventory-panel hidden" aria-label="Inventario">
        <h3>Inventario</h3>
        <div id="inventory-grid" class="inventory-grid"></div>
      </section>
      <button type="button" id="btn-exit-world" class="menu-btn hud-button">Salir al menú</button>
    </section>

    <script type="module" src="script.js"></script>
  </body>
</html>
